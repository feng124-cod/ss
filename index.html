<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ss机 完整版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 全局弹窗遮罩 */
.mask {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.mask.show { display: flex; }
.popup {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}
.popup h3 {
  color: #ff5a7f;
  margin-bottom: 16px;
  font-size: 16px;
}
.popup input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ffc0d0;
  border-radius: 8px;
  margin-bottom: 12px;
}
.popup button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #ff5a7f;
  color: #fff;
  margin: 0 6px;
}
.popup .btn-cancel {
  background: #eee;
  color: #666;
}

/* 图形密码九宫格 */
.pattern-grid {
  display: grid;
  grid-template-columns: repeat(3, 50px);
  grid-template-rows: repeat(3, 50px);
  gap: 16px;
  margin: 20px auto;
  width: fit-content;
}
.pattern-dot {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ffc0d0;
  position: relative;
}
.pattern-dot.active {
  background: #ff5a7f;
}
.pattern-line {
  position: absolute;
  background: #ff5a7f;
  height: 2px;
  transform-origin: left center;
  z-index: -1;
}

/* 手机外壳 */
.phone-box {
  width: 360px;
  height: 680px;
  border: 10px solid #f88ea9;
  border-radius: 36px;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, #ff96b4 0%, #ffc0d0 100%);
}
.slide-container {
  position: relative;
  width: 100%;
  height: 100%;
}
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  left: 0; top: 0;
  transition: transform 0.3s ease-out;
}

/* 状态栏样式重构 - 重点：返回箭头固定左上角 */
.status-bar {
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 15px;
  font-size: 12px;
  color: #fff;
  position: relative;
}
/* 通用状态栏内容居中 */
.status-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
/* 返回箭头 - 固定左上角，层级最高 */
.back-btn {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>') no-repeat center;
  background-size: 24px;
  cursor: pointer;
  z-index: 10;
}

/* ========== 你的原版登录页样式 ========== */
.welcome-area {
  text-align: center;
  padding: 20px 20px 15px;
  color: #fff;
}
.hi-text {
  font-size: 28px;
  margin-bottom: 8px;
}
.welcome-text {
  font-size: 22px;
}
.paw-icons {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 15px;
}
.paw {
  width: 60px;
  height: 45px;
  background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 80 60" fill="white"><path d="M40,10 Q50,0 60,10 Q70,20 65,35 Q60,50 40,45 Q20,50 15,35 Q10,20 20,10 Z M25,35 Q28,32 30,35 Q32,38 29,40 Q26,42 23,39 Z M35,40 Q38,37 40,40 Q42,43 39,45 Q36,47 33,44 Z M45,40 Q48,37 50,40 Q52,43 49,45 Q46,47 43,44 Z M55,35 Q58,32 60,35 Q62,38 59,40 Q56,42 53,39 Z"/></svg>') no-repeat center;
  background-size: contain;
}
.login-card {
  background: #fff;
  border-radius: 24px 24px 0 0;
  padding: 30px 25px;
  height: calc(100% - 220px);
}
.login-title {
  font-size: 20px;
  color: #333;
  margin-bottom: 25px;
  text-align: center;
}
.input-group {
  margin-bottom: 20px;
}
.input-label {
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
  display: block;
}
.input-box {
  display: flex;
  align-items: center;
  border: 1px solid #ffccd5;
  border-radius: 14px;
  padding: 12px 15px;
  background: #fff5f8;
}
.input-box input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;
  color: #333;
}
.input-box input::placeholder {
  color: #ff96b4;
}
.btn {
  width: 100%;
  padding: 14px;
  background: #ff5a7f;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
.btn:hover {
  background: #ff406a;
}
.agreement {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 15px 0;
  font-size: 14px;
  color: #666;
}
.agreement input {
  width: 16px;
  height: 16px;
}
.agreement a {
  color: #ff5a7f;
  text-decoration: none;
}
.forget {
  text-align: center;
  font-size: 14px;
  color: #999;
  margin-top: 10px;
}

/* ========== 主界面样式 ========== */
.user-area {
  display: flex;
  align-items: center;
  padding: 20px;
}
.user-card {
  flex: 1;
  background: rgba(255,255,255,0.92);
  border-radius: 20px;
  padding: 20px;
  position: relative;
}
.avatar-big {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #fff;
  margin-right: 12px;
  border: 3px solid #fff;
}
.nickname {
  font-size: 18px;
  font-weight: bold;
  color: #ff5a7f;
  margin-bottom: 6px;
}
.signature {
  font-size: 14px;
  color: #666;
}
.mini-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  right: 16px;
  bottom: 16px;
  border: 2px solid #ff8fab;
}

.app-container {
  padding: 15px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  position: relative;
}
.slot {
  width: 60px;
  height: 80px;
  position: relative;
}
.app {
  width: 60px;
  text-align: center;
  color: #fff;
  user-select: none;
  position: absolute;
  left: 0; top: 0;
}
.app-icon {
  width: 50px;
  height: 50px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  margin: 0 auto 6px;
  border: 1px solid rgba(255,255,255,0.4);
}
.app.dragging {
  transform: scale(1.15);
  z-index: 9999;
  pointer-events: none;
  position: fixed;
}
.app-name {
  font-size: 12px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.15);
}

/* 底部 Dock */
.dock {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  height: 65px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0 10px;
  z-index: 10;
}
.dock .app {
  position: static;
  width: 50px;
  height: 60px;
}
.dock .app-icon {
  width: 45px;
  height: 45px;
  background: rgba(255,255,255,0.4);
  border: none;
}
.dock .app-name {
  font-size: 11px;
  margin-top: 2px;
}

/* 翻页指示点 */
.dots {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 8px;
  z-index: 20;
}
.dot {
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
}
.dot.active { background: #fff; }

/* 音乐页 */
.music-page {
  padding: 20px 25px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  height: 100%;
  margin-top: 40px;
}
.music-box {
  background: rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 30px;
  text-align: center;
  width: 100%;
}
.cd {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: #ffc0d0;
  margin: 0 auto 20px;
  position: relative;
  animation: rotate 8s linear infinite;
}
.cd::before {
  content: "";
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.music-name {
  font-size: 18px;
  color: #ff5a7f;
  font-weight: bold;
}
.singer {
  font-size: 14px;
  color: #999;
  margin-top: 4px;
}
.progress {
  width: 100%;
  height: 4px;
  background: #ffdae3;
  border-radius: 2px;
  margin: 20px 0;
}
.progress-bar {
  width: 50%;
  height: 100%;
  background: #ff5a7f;
  border-radius: 2px;
}
.play-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ff5a7f;
  color: #fff;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  border: none;
}

/* 设置页 */
.settings-page {
  padding: 20px;
  color: #fff;
  padding-top: 40px; /* 给状态栏留空间 */
}
.settings-page h2 {
  margin-bottom: 20px;
  color: #fff;
  font-size: 20px;
}
.setting-item {
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
}
.setting-item h3 {
  font-size: 16px;
  margin-bottom: 4px;
}
.setting-item p {
  font-size: 12px;
  opacity: 0.8;
}

/* 密码设置页 */
.pwd-page {
  padding: 20px;
  color: #fff;
  padding-top: 40px; /* 给状态栏留空间 */
}
.pwd-page h2 {
  margin-bottom: 20px;
  font-size: 20px;
}
.pwd-option {
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.pwd-option h3 {
  font-size: 16px;
  font-weight: normal;
}
</style>
</head>
<body>

<!-- 数字密码验证弹窗 -->

<!-- 图形密码验证弹窗 -->
<div class="mask" id="verifyPatternMask">

    <div class="pattern-grid" id="verifyPatternGrid">

<!-- 设置图形密码弹窗 -->
<div class="mask" id="setPatternMask">
  <div class="popup" style="width: auto;">
    <h3>设置图形密码</h3>
    <div class="pattern-grid" id="setPatternGrid">
      <div class="pattern-dot" data-i="0"></div>

<div class="phone-box">
<div class="slide-container">
  <!-- 1. 你的原版登录页 -->

    <div class="status-bar">
      <div class="status-content">
        <span>•••••</span>

<script>
// 状态管理
let state = {
  activated: false,
  pwdType: 'none', // none / pattern / pwd
  pwd: '',
  pattern: []
};

// 页面切换核心函数
const pages = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.dot');
function showPage(id) {
  pages.forEach(p => p.style.transform = 'translateX(100%)');
  document.getElementById(id).style.transform = 'translateX(0)';
  dots.forEach(d => d.classList.remove('active'));
  document.querySelector(`[data-page="${id}"]`).classList.add('active');
}

// ========== 你的原版激活逻辑（只加了自动跳转） ==========
function activate() {
  const code = document.getElementById("activateCode").value.trim();
  const agree = document.getElementById("agree").checked;

  if (!agree) {
    alert("请先阅读并同意协议哦");
    return;
  }

  // 你的原版激活码：CMY2024
  if (code === "CMY2024") {
    state.activated = true;
    alert("激活成功！\n下次登录可使用密码或图形解锁");
    // 激活成功自动跳转到主界面
    showPage('homePage');
    // 隐藏登录页的协议（可选）
    document.querySelector('.agreement').style.display = 'none';
    // 把激活码输入框改成密码输入框
    document.getElementById('activateCode').placeholder = '请输入密码/图形密码';
    document.querySelector('.login-title').textContent = '解锁';
    document.querySelector('.btn').textContent = '解锁';
    document.querySelector('.btn').setAttribute('onclick', 'unlock()');
  } else {
    alert("激活码错误，请重试");
  }
}

// 解锁逻辑（激活后调用）
function unlock() {
  const inputVal = document.getElementById("activateCode").value.trim();
  if (state.pwdType === 'none') {
    showPage('homePage');
  } else if (state.pwdType === 'pwd' && inputVal === state.pwd) {
    showPage('homePage');
  } else if (state.pwdType === 'pattern' && inputVal === state.pattern.join('')) {
    showPage('homePage');
  } else {
    alert('密码错误');
  }
}

// ========== 页面跳转逻辑 ==========
// 主页 → 设置
document.getElementById('goSettings').addEventListener('click', () => showPage('settingsPage'));
// 设置 → 密码
document.getElementById('goPwd').addEventListener('click', () => showPage('pwdPage'));

// ========== 密码验证核心逻辑 ==========
// 统一验证当前密码：自动判断数字 / 图形
function verifyCurrent(cb) {
  if (state.pwdType === 'none') {
    cb();
    return;
  }
  if (state.pwdType === 'pwd') {
    // 验证数字密码
    const verifyMask = document.getElementById('verifyMask');
    const verifyInput = document.getElementById('verifyInput');
    verifyMask.classList.add('show');
    document.getElementById('verifyConfirm').onclick = () => {
      if (verifyInput.value === state.pwd) {
        verifyMask.classList.remove('show');
        verifyInput.value = '';
        cb();
      } else {
        alert('密码错误');
      }
    };
    document.getElementById('verifyCancel').onclick = () => {
      verifyMask.classList.remove('show');
      verifyInput.value = '';
    };
  } else if (state.pwdType === 'pattern') {
    // 验证图形密码
    const verifyPatternMask = document.getElementById('verifyPatternMask');
    const verifyPatternGrid = document.getElementById('verifyPatternGrid');
    let verifyPath = [];
    clearPattern(verifyPatternGrid);
    verifyPatternMask.classList.add('show');
    bindPattern(verifyPatternGrid, verifyPath);
    document.getElementById('verifyPatternConfirm').onclick = () => {
      if (verifyPath.join('') === state.pattern.join('')) {
        verifyPatternMask.classList.remove('show');
        cb();
      } else {
        alert('图形密码错误');
        clearPattern(verifyPatternGrid);
        verifyPath = [];
      }
    };
    document.getElementById('verifyPatternCancel').onclick = () => {
      verifyPatternMask.classList.remove('show');
    };
  }
}

// 清空图形
function clearPattern(grid) {
  grid.querySelectorAll('.pattern-dot').forEach(d => d.classList.remove('active'));
  grid.querySelectorAll('.pattern-line').forEach(l => l.remove());
}

// 绑定图形绘制
function bindPattern(grid, path) {
  let isDraw = false;
  path.length = 0;

  function down(e) {
    isDraw = true;
    mark(e);
  }
  function move(e) {
    if (!isDraw) return;
    e.preventDefault();
    mark(e);
  }
  function up() {
    isDraw = false;
  }

  function mark(e) {
    const t = e.touches ? e.touches[0] : e;
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (!el || !el.classList.contains('pattern-dot')) return;
    const i = +el.dataset.i;
    if (path.includes(i)) return;
    el.classList.add('active');
    path.push(i);
    if (path.length >= 2) {
      const last = path[path.length - 2];
      const lastEl = grid.querySelector(`[data-i="${last}"]`);
      const curEl = el;
      const r1 = lastEl.getBoundingClientRect();
      const r2 = curEl.getBoundingClientRect();
      const x1 = r1.left + r1.width/2;
      const y1 = r1.top + r1.height/2;
      const x2 = r2.left + r2.width/2;
      const y2 = r2.top + r2.height/2;
      const len = Math.hypot(x2 - x1, y2 - y1);
      const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
      const line = document.createElement('div');
      line.className = 'pattern-line';
      line.style.left = x1 + 'px';
      line.style.top = y1 + 'px';
      line.style.width = len + 'px';
      line.style.transform = `rotate(${ang}deg)`;
      grid.appendChild(line);
    }
  }

  grid.addEventListener('mousedown', down);
  grid.addEventListener('touchstart', down, { passive: false });
  grid.addEventListener('mousemove', move);
  grid.addEventListener('touchmove', move, { passive: false });
  grid.addEventListener('mouseup', up);
  grid.addEventListener('touchend', up);
}

// 1. 无密码
document.getElementById('optNone').addEventListener('click', () => {
  verifyCurrent(() => {
    state.pwdType = 'none';
    state.pwd = '';
    state.pattern = [];
    document.querySelector('#goPwd p').textContent = '无密码';
    alert('已关闭密码');
  });
});

// 2. 设置图形密码
document.getElementById('optPattern').addEventListener('click', () => {
  verifyCurrent(() => {
    const m = document.getElementById('setPatternMask');
    const g = document.getElementById('setPatternGrid');
    let path = [];
    clearPattern(g);
    m.classList.add('show');
    bindPattern(g, path);
    document.getElementById('setPatternConfirm').onclick = () => {
      if (path.length < 4) {
        alert('至少连接4个点');
        return;
      }
      state.pwdType = 'pattern';
      state.pattern = [...path];
      state.pwd = path.join('');
      document.querySelector('#goPwd p').textContent = '图形密码';
      m.classList.remove('show');
      alert('图形密码设置成功');
    };
    document.getElementById('setPatternCancel').onclick = () => {
      m.classList.remove('show');
    };
  });
});

// 3. 设置数字密码
document.getElementById('optPwd').addEventListener('click', () => {
  verifyCurrent(() => {
    const newPwd = prompt('请输入新数字密码');
    if (newPwd) {
      state.pwdType = 'pwd';
      state.pwd = newPwd;
      document.querySelector('#goPwd p').textContent = '数字密码';
      alert('密码设置成功');
    }
  });
});

// ========== 长按拖动图标（保留完美逻辑） ==========
const appArea = document.getElementById('appArea');
let timer = null;
let dragging = null;
let fromSlot = null;
let offsetX = 0, offsetY = 0;
let isDraggingApp = false;

appArea.addEventListener('touchstart', e => {
  const app = e.target.closest('.app');
  if (!app) return;
  fromSlot = app.parentElement;
  const p = e.touches[0];
  const rect = app.getBoundingClientRect();
  offsetX = p.clientX - rect.left;
  offsetY = p.clientY - rect.top;
  timer = setTimeout(() => {
    dragging = app;
    isDraggingApp = true;
    dragging.classList.add('dragging');
  }, 500);
}, { passive: false });
appArea.addEventListener('touchmove', () => clearTimeout(timer));
appArea.addEventListener('touchend', () => clearTimeout(timer));

document.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const p = e.touches[0];
  dragging.style.left = (p.clientX - offsetX) + 'px';
  dragging.style.top = (p.clientY - offsetY) + 'px';
}, { passive: false });

document.addEventListener('touchend', () => {
  clearTimeout(timer);
  if (!dragging) {
    isDraggingApp = false;
    return;
  }
  const rect = dragging.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const slots = [...document.querySelectorAll('.slot')];
  const target = slots.find(s => {
    const r = s.getBoundingClientRect();
    return cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom;
  });
  if (target) target.appendChild(dragging);
  else fromSlot.appendChild(dragging);
  dragging.classList.remove('dragging');
  dragging.style.left = '';
  dragging.style.top = '';
  dragging = null;
  isDraggingApp = false;
});

// 初始化显示登录页
showPage('loginPage');
